<!-- templates/admin_page.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Admin Dashboard{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        height: 100vh;
        overflow: hidden;
        font-family: Arial;
        background: radial-gradient(circle at 30% 30%, #1f1f2e, #050507 70%);
        position: relative;
      }

      body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background-image:
          radial-gradient(white 1px, transparent 1px),
          radial-gradient(white 1px, transparent 1px);
        background-size:
          40px 40px,
          80px 80px;
        opacity: 0.15;
        pointer-events: none;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 240px;
        height: 100vh;
        background: #111;
        color: white;
        padding-top: 20px;
      }

      .sidebar a {
        display: block;
        color: #ccc;
        padding: 12px 20px;
        text-decoration: none;
      }

      .sidebar a:hover {
        background: #333;
        color: white;
      }

      .topbar {
        position: fixed;
        left: 240px;
        top: 0;
        right: 0;
        height: 65px;
        background: white;
        border-bottom: 1px solid #ddd;
        display: flex;
        align-items: center;
        padding: 0 20px;
        z-index: 10;
      }

      .content {
        position: absolute;
        top: 65px;
        left: 240px;
        right: 0;
        bottom: 0;
        overflow-y: auto;
        padding: 25px;
      }

      .product-card {
        border: none;
        border-radius: 12px;
        transition: 0.3s;
      }

      .product-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      }

      .product-img {
        height: 180px;
        object-fit: cover;
      }

      .add-product-btn {
        position: fixed;
        top: 80px;
        right: 30px;
        z-index: 1000;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <div class="mb-4 text-center">
        <img src="https://i.pravatar.cc/80" class="rounded-circle mb-2" width="70" height="70"/>
        <h6 class="text-white m-0">Admin</h6>
        <small class="text-secondary">Administrator</small>
      </div>
      <hr class="text-secondary" />
      <a href="{{ url_for('admin_page') }}"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="{{ url_for('admin_products') }}"><i class="bi bi-box"></i> Products</a>
      <a href="{{ url_for('add_product') }}"><i class="bi bi-plus-circle"></i> Add Products</a>
      <a href="#"><i class="bi bi-bag"></i> Orders</a>
      <a href="#"><i class="bi bi-people"></i> Customers</a>
      <a href="#"><i class="bi bi-graph-up"></i> Reports</a>
      <a href="#"><i class="bi bi-gear"></i> Settings</a>
    </div>

    <div class="topbar">
      <h5 class="m-0">{% block page_title %}Dashboard{% endblock %}</h5>
      <div class="ms-auto">
        <button class="btn btn-outline-dark btn-sm">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>

    <div class="content">
      {% block content %}
      <!-- Default dashboard content -->
      <h4 class="text-light">Welcome to Admin Dashboard</h4>
      {% endblock %}
    </div>
  </body>
</html>
