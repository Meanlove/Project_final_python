<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080c12;
        --bg2: #0d1420;
        --bg3: #111927;
        --card: #0f1a26;
        --border: #1e2d3d;
        --cyan: #00d4ff;
        --cyan2: #0099cc;
        --orange: #ff6b2b;
        --green: #00ff88;
        --text: #e8f4ff;
        --muted: #4a6070;
        --muted2: #2a3d50;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "IBM Plex Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
      }

      /* SCANLINES overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 212, 255, 0.012) 2px,
          rgba(0, 212, 255, 0.012) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }

      /* NAVBAR */
      .navbar-nexus {
        background: rgba(8, 12, 18, 0.95);
        border-bottom: 1px solid var(--border);
        padding: 0.9rem 0;
        position: sticky;
        top: 0;
        z-index: 1000;
        backdrop-filter: blur(12px);
      }
      .brand {
        font-family: "Syne", sans-serif;
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: 0.15em;
        color: var(--text);
        text-decoration: none;
      }
      .brand span {
        color: var(--cyan);
      }
      .brand-sub {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.55rem;
        color: var(--muted);
        letter-spacing: 0.3em;
        display: block;
        margin-top: -0.2rem;
      }
      .nav-link-n {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.65rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted) !important;
        transition: color 0.2s;
        padding: 0.4rem 0.9rem !important;
      }
      .nav-link-n:hover {
        color: var(--cyan) !important;
      }
      .nav-link-n.active-nav {
        color: var(--cyan) !important;
      }
      .cart-btn {
        background: var(--cyan);
        color: var(--bg);
        border: none;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.6rem;
        letter-spacing: 0.2em;
        padding: 0.55rem 1.2rem;
        transition: all 0.25s;
        position: relative;
      }
      .cart-btn:hover {
        background: #00b8e0;
        transform: translateY(-1px);
      }
      .cart-count {
        position: absolute;
        top: -6px;
        right: -6px;
        background: var(--orange);
        color: #fff;
        font-size: 0.55rem;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
      }
      .search-bar {
        background: var(--bg3);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.75rem;
        padding: 0.5rem 1rem;
        outline: none;
        width: 260px;
        transition: border-color 0.2s;
      }
      .search-bar:focus {
        border-color: var(--cyan);
      }
      .search-bar::placeholder {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar-nexus">
      <div class="container">
        <div
          class="d-flex align-items-center justify-content-between gap-3 flex-wrap"
        >
          <a href="#" class="brand"
            >NEX<span>US</span
            ><small class="brand-sub">Electronics & Gadgets</small></a
          >
          <div class="d-none d-xl-flex align-items-center gap-1">
            <a href="/userpage" class="nav-link-n">Home</a>
            <a href="/products" class="nav-link-n">Products</a>
            <a href="#" class="nav-link-n">About Us</a>
            <a href="#" class="nav-link-n">Contact</a>
          </div>
          <div class="d-flex align-items-center gap-3">
            <input
              class="search-bar d-none d-lg-block"
              type="text"
              placeholder="Search products..."
            />
            <i
              class="bi bi-person"
              style="color: var(--muted); font-size: 1.1rem; cursor: pointer"
              onclick="showToast('👤 Login / Register')"
            ></i>
            <button class="cart-btn position-relative" onclick="toggleCart()">
              <i class="bi bi-bag me-1"></i>Cart<span
                class="cart-count"
                id="cart-count"
                >0</span
              >
            </button>
          </div>
        </div>
      </div>
    </nav>
  </body>
</html>
